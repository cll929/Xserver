name: XServer Extend Schedule

on:
  schedule:
    - cron: '0 0 * * *' # Runs every 24 hours at 00:00 UTC
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  extend-server:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chrome

    - name: Run Extension Script
      env:
        USERS_JSON: ${{ secrets.USERS_JSON }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: node action.js

    - name: Upload Screenshots
      if: always() # Run even if the script fails
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: "*.png"
        retention-days: 5

    - name: Heartbeat commit
      if: always()
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git pull origin main || true
        echo "Last run: $(date -u)" > heartbeat.txt
        git add heartbeat.txt
        git commit -m "heartbeat $(date -u)" || echo "No changes"
        git push origin HEAD:main
